<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">

    <title>Profile Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .profile-header {
            text-align: center;
        }
        .profile-header img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
        }
        .stats {
            background: #e0ffe0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .menu {
            margin-top: 20px;
        }
        .menu button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            background: #001f3f;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .logout {
            background: red !important;
        }
        .product-container {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <img id="profilePic" src="images/account.png" alt="Profile Picture">
            <h2 id="username">Username</h2>
            <p id="email">Email</p>
            <small id="joined">Loading...</small>
        </div>
        <!-- <div class="stats">
            <p>Total Earnings: <b id="earnings">&#8377; 0</b></p>
            <p>Total Withdrawable: <b id="withdrawable">&#8377; 0</b></p>
        </div> -->
        <div class="menu">
            <!-- <button>Become a Verified User</button> -->
            <!-- <button>All Transactions</button> -->
            <button onclick="window.location.href='listedproduct.html'">Your Listed Products</button>

            <button onclick="window.location.href='https://tally.so/r/w2l8Jg'">Help and Support</button>

            <button onclick="window.location.href='seller.html'">Sell a Product</button>
            <button onclick="window.location.href='category.html'">Explore</button>    

            <a href="cart.html"><button>Your Cart</button></a>
            <!-- <button>Referrals</button> -->
            <!-- <button>FAQs</button> -->
            
            <button onclick="window.location.href='index.html'">HOME</button>
            <button id="logoutButton" class="logout">Logout</button>
        </div>
        
        <div id="userProducts" class="product-container">
            <!-- User products will be displayed here -->
        </div>
        
        <div id="cartItems" class="product-container">
            <!-- Cart items will be displayed here -->
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const user = JSON.parse(localStorage.getItem('user'));
            
            if (!user) {
                window.location.href = 'login.html';  // Redirect to login if not logged in
                return;
            }

            // Update profile info
            document.getElementById('username').textContent = user.name;
            document.getElementById('email').textContent = user.email;
            document.getElementById('profilePic').src = "images/account.png";
            
            if (user.joined) {
                document.getElementById('joined').textContent = `Joined ${user.joined}`;
            } else {
                document.getElementById('joined').textContent = 'Member';
            }

            // Fetch user data from server
            fetch(`https://online-exchange-platform.vercel.app/profile?userId=${user._id}`)
                .then(response => response.json())
                .then(userData => {
                    
                    // Display products & cart items if they exist in the response
                    if (userData.products) {
                        displayProducts(userData.products, 'userProducts');
                    }
                    if (userData.cart) {
                        displayProducts(userData.cart, 'cartItems');
                    }
                })
                .catch(error => console.error("Profile Fetch Error:", error));
                
            // Logout functionality
            document.getElementById('logoutButton').addEventListener('click', function () {
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            });
        });

        function displayProducts(products, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            if (!products || products.length === 0) {
                container.innerHTML = "<p>No items found</p>";
                return;
            }
            
            container.innerHTML = `<h3>${containerId === 'userProducts' ? 'Your Products' : 'Your Cart'}</h3>` + 
                products.map(p => `<div>${p.name} - $${p.price}</div>`).join('');
        }
    </script>
</body>
</html>
