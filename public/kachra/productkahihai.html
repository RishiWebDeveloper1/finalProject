<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
        }
        
        .header {
            max-width: 1200px;
            margin: 0 auto 20px auto;
        }
        
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        
        .search-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        .search-input:focus {
            border-color: #aaa;
        }
        
        .search-button {
            background: #f0f0f0;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .search-button:hover {
            background: #e0e0e0;
        }
        
        .product-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .product-card {
            background: #ffffff;
            width: 300px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .image-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
        }
        
        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }
        
        .product-card:hover img {
            transform: scale(1.05);
        }
        
        .product-details {
            padding: 15px 0;
        }
        
        .product-name {
            font-size: 16px;
            font-weight: 500;
            margin: 0 0 5px 0;
        }
        
        .product-description {
            color: #666;
            font-size: 14px;
            margin: 0 0 8px 0;
            min-height: 20px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: bold;
            margin: 8px 0;
        }
        
        .product-age {
            color: #666;
            font-size: 14px;
            margin: 8px 0;
        }
        
        .product-actions {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            margin-top: 10px;
            border-top: 1px solid #eee;
        }
        
        .action-button {
            background: #f0f0f0;
            border: none;
            border-radius: 25px;
            padding: 8px 0;
            width: 48%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .like-button {
            color: #ff4d4d;
        }
        
        .share-button {
            color: #333;
        }
        
        .divider {
            height: 1px;
            background-color: #eee;
            margin: 10px 0;
            width: 100%;
        }
        
        .no-results {
            width: 100%;
            text-align: center;
            padding: 30px;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .product-card {
                width: calc(50% - 10px);
            }
        }
        
        @media (max-width: 480px) {
            .product-card {
                width: 100%;
            }
            .search-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Search products..." />
            <button id="search-button" class="search-button">Search</button>
        </div>
    </div>
    
    <div id="product-list" class="product-container">
        <!-- Products will be populated here -->
    </div>
    
    <script>
        // Store the original products data
        let allProducts = [];
        
        // Function to render products
        function renderProducts(products) {
            let container = document.getElementById("product-list");
            container.innerHTML = "";
            
            if (products.length === 0) {
                container.innerHTML = "<div class='no-results'>No products found</div>";
            } else {
                products.forEach(product => {
                    container.innerHTML += `
                        <div class="product-card">
                            <div class="image-container">
                                <img src="${product.imageUrl}" alt="${product.name}">
                            </div>
                            <div class="product-details">
                                <h3 class="product-name">${product.name}</h3>
                                <p class="product-description">${product.description || ''}</p>
                                <p class="product-price">₹ ${product.price}</p>
                                <p class="product-age">${product.age || ''}</p>
                                <div class="product-actions">
                                    <button class="action-button like-button">♡</button>
                                    <button class="action-button share-button">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="18" cy="5" r="3"></circle>
                                            <circle cx="6" cy="12" r="3"></circle>
                                            <circle cx="18" cy="19" r="3"></circle>
                                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="divider"></div>
                        </div>
                    `;
                });
            }
        }
        
        // Function to filter products based on search query
        function filterProducts(query) {
            query = query.toLowerCase().trim();
            
            if (!query) {
                return allProducts; // Return all products if query is empty
            }
            
            return allProducts.filter(product => {
                return (
                    product.name.toLowerCase().includes(query) || 
                    (product.description && product.description.toLowerCase().includes(query))
                );
            });
        }
        
        // Setup search functionality
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            const searchButton = document.getElementById('search-button');
            
            // Search when button is clicked
            searchButton.addEventListener('click', () => {
                const query = searchInput.value;
                const filteredProducts = filterProducts(query);
                renderProducts(filteredProducts);
            });
            
            // Search when Enter key is pressed
            searchInput.addEventListener('keyup', (event) => {
                if (event.key === 'Enter') {
                    const query = searchInput.value;
                    const filteredProducts = filterProducts(query);
                    renderProducts(filteredProducts);
                }
            });
        }
        
        // Fetch products from API
        function fetchProducts() {
            const params = new URLSearchParams(window.location.search);
            let category = params.get("category");
            // If category is null or undefined, remove it
            if (!category || category === "null") {
                category = ""; 
            }
            
            fetch(`/api/products?category=${encodeURIComponent(category)}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Network response was not ok");
                    }
                    return response.json();
                })
                .then(data => {
                    allProducts = data; // Store all products
                    renderProducts(allProducts); // Render all products initially
                    setupSearch(); // Setup search functionality
                })
                .catch(error => {
                    console.error("Error fetching products:", error);
                    document.getElementById("product-list").innerHTML = 
                        "<div class='no-results'>Error loading products. Please try again later.</div>";
                });
        }
        
        // Initialize
        fetchProducts();
    </script>
</body>
</html>
