<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Form</title>
  <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
  <style>
    :root {
      --primary-color: #4361ee;
      --secondary-color: #3f37c9;
      --success-color: #4caf50;
      --error-color: #f44336;
      --text-color: #333;
      --light-gray: #f5f5f5;
      --border-color: #ddd;
      --border-radius: 8px;
      --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background-color: #f9f9f9;
      color: var(--text-color);
      line-height: 1.6;
      padding: 20px;
    }
    
    .form-container {
      max-width: 700px;
      margin: 0 auto;
      background-color: white;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      padding: 30px;
    }
    
    h2 {
      text-align: center;
      color: var(--primary-color);
      margin-bottom: 25px;
      font-weight: 600;
      position: relative;
      padding-bottom: 10px;
    }
    
    h2:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background-color: var(--primary-color);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      background-color: #fff;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
    }
    
    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 12px;
      padding-right: 30px;
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    input[type="file"] {
      padding: 10px;
      border: 2px dashed var(--border-color);
      background-color: var(--light-gray);
    }
    
    .file-upload-container {
      position: relative;
      border: 2px dashed var(--border-color);
      border-radius: var(--border-radius);
      padding: 30px 20px;
      text-align: center;
      background-color: var(--light-gray);
      transition: border-color 0.3s;
      cursor: pointer;
    }
    
    .file-upload-container:hover {
      border-color: var(--primary-color);
    }
    
    .file-upload-container input {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    
    .upload-icon {
      display: block;
      font-size: 30px;
      margin-bottom: 10px;
      color: var(--primary-color);
    }
    
    small {
      display: block;
      margin-top: 6px;
      color: #777;
      font-size: 12px;
    }
    
    .file-name {
      font-size: 14px;
      color: var(--primary-color);
      margin-top: 8px;
      font-weight: 500;
    }
    
    .image-preview {
      margin-top: 15px;
      border-radius: var(--border-radius);
      overflow: hidden;
      background-color: var(--light-gray);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .image-preview img {
      max-width: 100%;
      max-height: 200px;
      object-fit: contain;
    }
    
    button {
      cursor: pointer;
      padding: 12px 25px;
      border: none;
      border-radius: var(--border-radius);
      transition: background-color 0.3s, transform 0.2s;
      font-weight: 500;
    }
    
    button:hover {
      transform: translateY(-2px);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    #submitButton {
      background-color: var(--primary-color);
      color: white;
      width: 100%;
      font-size: 16px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    #submitButton:hover {
      background-color: var(--secondary-color);
    }
    
    .action-buttons {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }
    
    .primary-button, .secondary-button {
      flex: 1;
      height: 48px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .primary-button {
      background-color: var(--success-color);
      color: white;
    }
    
    .primary-button:hover {
      background-color: #43a047;
    }
    
    .secondary-button {
      background-color: white;
      color: var(--primary-color);
      border: 1px solid var(--primary-color);
    }
    
    .secondary-button:hover {
      background-color: rgba(67, 97, 238, 0.05);
    }
    
    .message {
      padding: 15px;
      margin-bottom: 25px;
      border-radius: var(--border-radius);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .error {
      background-color: #ffebee;
      color: var(--error-color);
      border-left: 4px solid var(--error-color);
    }
    
    .success {
      background-color: #e8f5e9;
      color: var(--success-color);
      border-left: 4px solid var(--success-color);
    }
    
    .hidden {
      display: none;
    }
    
    /* Price input styling */
    .price-input-container {
      position: relative;
    }
    
    .price-input-container input {
      padding-left: 30px;
    }
    
    .price-input-container:before {
      content: "₹";
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: 500;
      color: #666;
    }
    
    /* Responsive adjustments */
    @media (max-width: 600px) {
      .form-container {
        padding: 20px;
      }
      
      .action-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Seller Dashboard</h2>
    
    <!-- Status Messages -->
    <div id="statusMessage" class="message hidden"></div>
    
    <form id="sellerForm">
      <!-- Category -->
      <div class="form-group">
        <label for="category">Category <span style="color: var(--error-color);">*</span></label>
        <select id="category" name="category" required>
          <option value="" disabled selected>Select a category</option>
          <option value="electronics">Electronics</option>
          <option value="fashion">Fashion</option>
          <option value="footwear">Footwear</option>
          <option value="books">Books</option>
          <option value="watches">Watches</option>
          <option value="sports">Sports</option>
        </select>
      </div>

      <!-- Product Name -->
      <div class="form-group">
        <label for="name">Product Name <span style="color: var(--error-color);">*</span></label>
        <input type="text" id="name" name="name" placeholder="Enter product name" required>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label for="description">Description <span style="color: var(--error-color);">*</span></label>
        <textarea id="description" name="description" rows="3" placeholder="Enter product description" required></textarea>
      </div>

      <!-- Price -->
      <div class="form-group">
        <label for="price">Price <span style="color: var(--error-color);">*</span></label>
        <div class="price-input-container">
          <input type="number" id="price" name="price" min="0.01" step="0.01" placeholder="Enter product price" required>
        </div>
      </div>

      <!-- Product Image -->
      <div class="form-group">
        <label for="productimage">Product Image <span style="color: var(--error-color);">*</span></label>
        <div class="file-upload-container">
          <i class="fas fa-cloud-upload-alt upload-icon"></i>
          <p>Drag & drop your image here or click to browse</p>
          <input type="file" id="productimage" name="productimage" accept="image/jpeg,image/png,image/gif" required>
        </div>
        <small>Upload a clear image of your product (JPEG, PNG, GIF only).</small>
        <p id="fileName" class="file-name"></p>
        <div id="imagePreview" class="image-preview"></div>
      </div>

      <!-- Submit Button -->
      <div class="form-group">
        <button type="submit" id="submitButton">
          <i class="fas fa-plus-circle"></i> Add Product
        </button>
      </div>
    </form>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button id="loginButton" class="secondary-button">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
      <button id="startSelling" class="primary-button">
        <i class="fas fa-store"></i> Start Selling
      </button>
    </div>
  </div>

  <script>
   
  </script>
  <script src="seller.js"></script>
</body>
</html>
