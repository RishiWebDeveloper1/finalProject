<style>
/* Footer Styling */
.footer {
    background-color: #2c2c2c;
    color: #fff;
    padding: 20px 0;
    width: 100%;
    margin-top: auto; /* Push footer to bottom */
}

.footer-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

.footer-section {
    flex: 1 1 250px;
    margin: 10px;
}

.footer-section h4 {
    font-size: 18px;
    margin-bottom: 15px;
    color: #fff;
    position: relative;
}

.footer-section p, 
.footer-section ul {
    font-size: 14px;
    line-height: 1.6;
    margin: 0;
    font-weight: 400;
}

.footer-section ul {
    list-style: none;
    padding: 0;
}

.footer-section ul li {
    margin-bottom: 10px;
}

.footer-section ul li a {
    color: #fff;
    text-decoration: none;
    transition: color 0.3s ease;
    padding-bottom: 2px;
    border-bottom: 1px solid transparent;
}

.footer-section ul li a:hover {
    color: #f8b400;
    border-bottom: 1px solid #f8b400;
}

.footer-bottom {
    text-align: center;
    padding: 15px 20px;
    border-top: 1px solid #444;
    font-size: 12px;
    margin-top: 20px;
    font-weight: 400;
    width: 100%;
}

/* Copyright style for centered text with heart */
.copyright {
    width: 100%;
    text-align: center;
    padding: 10px 0;
    font-size: 14px;
    color: #fff;
}

.copyright .heart {
    color: #ff0000; /* Red heart color */
    animation: heartbeat 1.5s ease infinite;
}

@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

/* Responsive adjustments for footer */
@media screen and (max-width: 768px) {
    .footer-container {
        flex-direction: column;
        text-align: center;
    }
    
    .footer-section {
        margin-bottom: 25px;
    }
}

@media screen and (max-width: 480px) {
    .footer-section {
        flex: 1 1 100%;
    }
    
    .copyright {
        font-size: 12px;
    }
}
</style>
