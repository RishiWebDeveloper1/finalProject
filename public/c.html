<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop By Category | XCHANGE</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 350px;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
      text-align: center;
    }

    .card-title {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .card-description {
      font-size: 1rem;
      color: #555;
      margin-bottom: 15px;
    }

    .card-button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    .card-button:hover {
      background-color: #0056b3;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #2c2c2c;
      color: white;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo-box">
      <a href="index.html">XCHANGE</a>
    </div>
  </nav>

  <div class="container">
    <h1>Shop By Category</h1>
  </div>

  <div class="card-container">
    <div class="card">
      <img src="category-images/electronics.jpeg" alt="Electronics">
      <div class="card-content">
        <h2 class="card-title">Electronics</h2>
        <p class="card-description">Find the latest and best electronic
             gadgets at unbeatable prices.</p>
        <a href="#" class="card-button">EXPLORE</a>
      </div>
    </div>
    
    <div class="card">
      <img src="category-images/clothes.jpeg" alt="Clothes">
      <div class="card-content">
        <h2 class="card-title">Clothes</h2>
        <p class="card-description">Trendy and stylish clothing for every occasion.</p>
        <a href="#" class="card-button">EXPLORE</a>
      </div>
    </div>
    
    <div class="card">
      <img src="category-images/footwear.jpeg" alt="Footwear">
      <div class="card-content">
        <h2 class="card-title">Footwear</h2>
        <p class="card-description">Step up your game with top-quality footwear.</p>
        <a href="#" class="card-button">EXPLORE</a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 XCHANGE. All rights reserved.</p>
  </footer>
</body>
</html>
