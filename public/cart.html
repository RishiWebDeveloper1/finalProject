<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f8f9fa;
            color: #333;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h2 {
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.2rem;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        #cart-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .empty-cart-message {
            text-align: center;
            padding: 40px 0;
            color: #7f8c8d;
            font-size: 1.2rem;
        }
        
        .empty-cart-message i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #bdc3c7;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #eee;
            position: relative;
        }
        
        .cart-item:last-child {
            border-bottom: none;
        }
        
        .cart-item-image {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            background-color: #f1f3f6;
        }
        
        .cart-item-details {
            flex: 1;
            padding: 0 20px;
        }
        
        .cart-item-name {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        
        .cart-item-price {
            color: #e74c3c;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        
        .cart-item-quantity {
            display: flex;
            align-items: center;
        }
        
        .quantity-label {
            margin-right: 10px;
            color: #7f8c8d;
        }
        
        .quantity-controls {
            display: flex;
            align-items: center;
            background-color: #f1f3f6;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .quantity-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        
        .quantity-btn:hover {
            background-color: #e0e0e0;
        }
        
        .quantity-value {
            padding: 0 15px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .remove-btn {
            background-color: #f8f9fa;
            color: #7f8c8d;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.2s;
            margin-left: 20px;
        }
        
        .remove-btn:hover {
            background-color: #ffebee;
            color: #e74c3c;
        }
        
        .remove-btn i {
            margin-right: 5px;
        }
        
        .cart-summary {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .summary-row:last-child {
            border-bottom: none;
            font-weight: 700;
            padding-top: 15px;
            font-size: 1.2rem;
        }
        
        #checkout-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
            transition: background-color 0.2s;
            font-weight: 600;
        }
        
        #checkout-btn:hover {
            background-color: #219653;
        }
        
        #continue-shopping {
            text-align: center;
            margin-top: 20px;
        }
        
        #continue-shopping a {
            color: #3498db;
            text-decoration: none;
        }
        
        #continue-shopping a:hover {
            text-decoration: underline;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .cart-item-image {
                margin-bottom: 10px;
            }
            
            .cart-item-details {
                padding: 0;
                margin-bottom: 15px;
                width: 100%;
            }
            
            .cart-actions {
                width: 100%;
                display: flex;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <h2>My Shopping Cart</h2>
    
    <div id="cart-container">
        <p>Loading cart items...</p>
    </div>
    
    <div id="cart-summary" class="cart-summary" style="display: none;">
        <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
        </div>
        <div class="summary-row">
            <span>Shipping</span>
            <span id="shipping">Free</span>
        </div>
        <div class="summary-row">
            <span>Total</span>
            <span id="total">₹0</span>
        </div>
    </div>
    
    <button id="checkout-btn" onclick="checkout()" style="display: none;">
        Proceed to Checkout
    </button>
    
    <div id="continue-shopping" style="display: none;">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
    </div>
    
    <script>
        // Load cart from localStorage
        function loadCart() {
            // Get cart from localStorage
            const cartData = JSON.parse(localStorage.getItem('cart') || '[]');
            const cartContainer = document.getElementById("cart-container");
            const checkoutBtn = document.getElementById("checkout-btn");
            const cartSummary = document.getElementById("cart-summary");
            const continueShopping = document.getElementById("continue-shopping");
            
            cartContainer.innerHTML = "";
            
            if (cartData.length === 0) {
                cartContainer.innerHTML = `
                    <div class="empty-cart-message">
                        <i class="fas fa-shopping-cart"></i>
                        <p>Your cart is empty!</p>
                    </div>
                `;
                checkoutBtn.style.display = "none"; // Hide checkout button
                cartSummary.style.display = "none"; // Hide summary
                continueShopping.style.display = "block"; // Show continue shopping
                return;
            }
            
            checkoutBtn.style.display = "block"; // Show checkout button
            cartSummary.style.display = "block"; // Show summary
            continueShopping.style.display = "block"; // Show continue shopping
            
            let subtotal = 0;
            
            // Display each cart item
            cartData.forEach(item => {
                const quantity = item.quantity || 1;
                const itemTotal = item.price * quantity;
                subtotal += itemTotal;
                
                const cartItem = document.createElement("div");
                cartItem.classList.add("cart-item");
                
                // Use item properties as stored in localStorage
                cartItem.innerHTML = `
                    <img class="cart-item-image" src="${item.imageUrl || '/api/placeholder/100/100'}" alt="${item.name}">
                    <div class="cart-item-details">
                        <h3 class="cart-item-name">${item.name}</h3>
                        <p class="cart-item-price">₹${item.price.toLocaleString()}</p>
                        <div class="cart-item-quantity">
                            <span class="quantity-label">Quantity:</span>
                            <div class="quantity-controls">
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">
                                    <i class="fas fa-minus"></i>
                                </button>
                                <span class="quantity-value">${quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">
                                <i class="fas fa-trash-alt"></i> Remove
                            </button>
                        </div>
                    </div>
                `;
                
                cartContainer.appendChild(cartItem);
            });
            
            // Update the summary
            document.getElementById("subtotal").textContent = `₹${subtotal.toLocaleString()}`;
            document.getElementById("total").textContent = `₹${subtotal.toLocaleString()}`;
        }
        
        // Update quantity
        function updateQuantity(productId, change) {
            // Get current cart
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            // Find the item in the cart
            const itemIndex = cart.findIndex(item => item.id === productId);
            
            if (itemIndex !== -1) {
                // If item doesn't have a quantity property yet, add it
                if (!cart[itemIndex].hasOwnProperty('quantity')) {
                    cart[itemIndex].quantity = 1;
                }
                
                // Update quantity
                cart[itemIndex].quantity += change;
                
                // Remove item if quantity is 0 or less
                if (cart[itemIndex].quantity <= 0) {
                    cart.splice(itemIndex, 1);
                }
                
                // Save updated cart
                localStorage.setItem('cart', JSON.stringify(cart));
                
                // Update cart display
                loadCart();
                
                // Update cart counter in navbar (if exists on this page)
                updateCartCounter();
            }
        }
        
        // Update cart counter (in case we're showing it in the navbar)
        function updateCartCounter() {
            const cartCounter = document.getElementById('cart-nav-count');
            if (cartCounter) {
                const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                
                if (cart.length > 0) {
                    cartCounter.textContent = cart.length;
                    cartCounter.style.display = 'flex';
                } else {
                    cartCounter.style.display = 'none';
                }
            }
        }
        
        // Remove item from cart
        function removeFromCart(productId) {
            // Get current cart
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            // Remove the item
            cart = cart.filter(item => item.id !== productId);
            
            // Save updated cart
            localStorage.setItem('cart', JSON.stringify(cart));
            
            // Update cart display
            loadCart();
            
            // Update cart counter in navbar (if exists on this page)
            updateCartCounter();
        }
        
        // Calculate total price from cart items
        function calculateTotal(cartData) {
            let total = 0;
            cartData.forEach(item => {
                const quantity = item.quantity || 1;
                total += item.price * quantity;
            });
            return total;
        }
        
        // Checkout function
        function checkout() {
            // Get the cart data and total amount
            const cartData = JSON.parse(localStorage.getItem('cart') || '[]');
            const total = calculateTotal(cartData);
            
            // Create a simple order summary to pass in URL parameters
            const orderSummary = encodeURIComponent(JSON.stringify({
                amount: total,
                items: cartData.length,
                timestamp: new Date().toISOString()
            }));
            
            // Redirect to a payment page (you would create this page)
            window.location.href = `payment.html?order=${orderSummary}`;
        }
        
        // Load cart when page opens
        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
        });
        
        // Load cart immediately in case DOM is already loaded
        loadCart();
    </script>
</body>
</html>
