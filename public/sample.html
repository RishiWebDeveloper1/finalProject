<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar & Footer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap');
        
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
            font-weight: 600;
            background-image: linear-gradient(220deg, aqua, rgb(149, 255, 255), rgb(187, 255, 255), white);
    /* background-size: cover;
    background-repeat: no-repeat; */
    transition: background 0.5s ease-in-out;
        }

        nav {
            margin-bottom: 5%;
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #2c2c2c;
            color: white;
        }

        .logo-box {
            width: 20%;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .route-link-box {
            width: 35%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .route-link-box a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .route-link-box a:hover {
            color: #f8b400;
        }

        .login-box-container {
            width: 15%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer {
            width: 100%;
            height: 200px;
            color: rgb(59, 59, 59);
            font-size: 1.2rem;
            font-weight: 540;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c2c2c;
            color: white;
            flex-direction: column;
        }

        .footer-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .footer-section {
            flex: 1;
            margin: 10px;
        }

        .footer-section h4 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #f8b400;
        }

        .footer-section ul {
            list-style: none;
            padding: 0;
        }

        .footer-section ul li {
            margin-bottom: 8px;
        }

        .footer-section ul li a {
            color: #f8b400;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-section ul li a:hover {
            color: #fff;
        }

        .footer-bottom {
            text-align: center;
            padding: 10px;
            border-top: 1px solid #444;
            font-size: 12px;
            width: 100%;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box">LOGO</div>
        <div class="route-link-box">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
        <div class="login-box-container">
            <a href="#" style="color:white; text-decoration:none;">Login</a>
        </div>
    </nav>

    <footer>
        <div class="footer-container">
            <div class="footer-section">
                <h4>About Us</h4>
                <p>We provide the best services to our customers.</p>
            </div>
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="#">Privacy Policy</a></li>
                    <li><a href="#">Terms of Service</a></li>
                    <li><a href="#">Support</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Contact Us</h4>
                <p>Email: support@example.com</p>
                <p>Phone: +1234567890</p>
            </div>
        </div>
        <div class="footer-bottom">
            &copy; 2025 Your Website | All Rights Reserved
        </div>
    </footer>

</body>
</html>
